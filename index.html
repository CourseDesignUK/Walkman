<div class="walkman-body">
    <div class="brand">SONY</div>
    <div class="model">WALKMAN</div>
    
    <div class="cassette-door">
        <div class="window-tint">
            <div class="tape-ribbon-container">
                <div class="spool-housing">
                    <div id="tape-left" class="tape-mass"></div>
                    <div class="spool left playing" id="spool-l"></div>
                </div>
                <div class="spool-housing">
                    <div id="tape-right" class="tape-mass"></div>
                    <div class="spool right playing" id="spool-r"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="button-rack">
        <button id="play-btn" class="physical-btn">
            <div class="icon">▶</div>
        </button>
        <button class="physical-btn stop">
            <div class="icon">■</div>
        </button>
    </div>
</div>
